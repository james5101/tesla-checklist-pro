<!doctype html><html><head>
<link rel="stylesheet" href="../colors_and_type.css?v=2">
<style>
  body { margin:0; display: grid; grid-template-columns: 1fr 1fr; }
  .pane { padding: 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; min-height: 130px; position: relative; }
  .pane.std { background: #0A0B0D; }
  .pane.cbr {
    background:
      linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px),
      #05020E;
    background-size: 24px 24px;
  }
  .tag { position: absolute; top: 8px; left: 14px; font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; }
  .std .tag { color: #6E7480; } .cbr .tag { color: #00F0FF; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500; border-radius: 2px; border: 1px solid; cursor: pointer; }
  .std .b-pri { background: #FF2D2D; border-color: #FF2D2D; color: #0A0B0D; font-weight: 600; }
  .std .b-sec { background: #111216; border-color: #2A2E35; color: #F5F6F7; }
  .std .b-ghost { background: transparent; border-color: transparent; color: #B8BCC4; }
  .cbr .btn { font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; font-weight: 600; clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px); }
  .cbr .b-pri { background: #00F0FF; border-color: #00F0FF; color: #05020E; box-shadow: 0 0 16px rgba(0,240,255,0.4); }
  .cbr .b-sec { background: transparent; border-color: #00F0FF; color: #00F0FF; }
  .cbr .b-ghost { background: transparent; border-color: transparent; color: #9AB8D4; clip-path: none; }
</style>
</head><body>
<div class="pane std"><div class="tag">● Standard</div>
  <button class="btn b-pri">Start inspection →</button>
  <button class="btn b-sec">Cancel</button>
  <button class="btn b-ghost">Learn more</button>
</div>
<div class="pane cbr"><div class="tag">● Cyber</div>
  <button class="btn b-pri">Execute →</button>
  <button class="btn b-sec">Abort</button>
  <button class="btn b-ghost">Scan</button>
</div>
</body></html>
