<!doctype html><html><head>
<link rel="stylesheet" href="../colors_and_type.css?v=2">
<style>
  body { margin:0; display: grid; grid-template-columns: 1fr 1fr; min-height: 200px; }
  .pane { padding: 20px; position: relative; }
  .std { background: #0A0B0D; }
  .cbr { background:
      linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px),
      #05020E;
      background-size: 20px 20px;
  }
  .tag { font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
  .std .tag { color: #6E7480; } .cbr .tag { color: #00F0FF; }
  .row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 6px; }
  .std .row { background: #111216; border: 1px solid #1D2026; }
  .cbr .row { background: rgba(20,10,46,0.6); border: 1px solid #3A1E6E; }
  .cbr .row.flag { border-color: #FF2EC8; box-shadow: 0 0 12px rgba(255,46,200,0.3); }
  .std .row.flag { background: rgba(255,45,45,0.05); }
  .id { font-family: 'Geist Mono', monospace; font-size: 10px; }
  .std .id { color: #3E434C; } .cbr .id { color: #6878A8; }
  .title { flex: 1; font-size: 12px; color: #F5F6F7; }
  .cbr .title { color: #E8FCFF; }
  .b { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid; }
  .std .b.pass { background: #00D18F; border-color: #00D18F; color: #0A0B0D; }
  .std .b.nope { border-color: #2A2E35; color: #6E7480; background: transparent; }
  .std .b.flg  { background: #FF2D2D; border-color: #FF2D2D; color: #0A0B0D; }
  .cbr .b.pass { background: #00FF9C; border-color: #00FF9C; color: #05020E; box-shadow: 0 0 8px rgba(0,255,156,0.6); }
  .cbr .b.nope { border-color: #3A1E6E; color: #6878A8; background: transparent; }
  .cbr .b.flg  { background: #FF2EC8; border-color: #FF2EC8; color: #05020E; box-shadow: 0 0 10px rgba(255,46,200,0.7); }
</style></head><body>
<div class="pane std">
  <div class="tag">● Standard · inspection rows</div>
  <div class="row"><span class="id">EXT_001</span><span class="title">Hood alignment to fenders</span><span class="b pass">✓</span><span class="b nope">⚑</span><span class="b nope">✕</span></div>
  <div class="row flag"><span class="id">EXT_005</span><span class="title">Rear-left panel gap</span><span class="b nope">✓</span><span class="b flg">⚑</span><span class="b nope">✕</span></div>
</div>
<div class="pane cbr">
  <div class="tag">● Cyber · inspection rows</div>
  <div class="row"><span class="id">EXT_001</span><span class="title">HOOD ALIGNMENT TO FENDERS</span><span class="b pass">✓</span><span class="b nope">⚑</span><span class="b nope">✕</span></div>
  <div class="row flag"><span class="id">EXT_005</span><span class="title">REAR-LEFT PANEL GAP</span><span class="b nope">✓</span><span class="b flg">⚑</span><span class="b nope">✕</span></div>
</div>
</body></html>
